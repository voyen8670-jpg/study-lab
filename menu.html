<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Lab - Menu</title>
  <style>
    /* Nền galaxy */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("universe.jpg") no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
    }

    /* Container */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      max-width: 1000px;
      margin: 80px auto;
      padding: 20px;
    }

    /* Card */
    .card {
      background: rgba(0, 0, 0, 0.6);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 30px rgba(0, 234, 255, 0.8);
    }

    /* Icon */
    .icon {
      font-size: 60px;
      margin-bottom: 15px;
      display: inline-block;
      filter: drop-shadow(0 0 6px rgba(0, 234, 255, 0.6));
      transition: transform 0.3s, filter 0.3s;
    }

    .card:hover .icon {
      transform: scale(1.2);
      filter: drop-shadow(0 0 12px rgba(0, 234, 255, 1));
    }

    /* Tiêu đề */
    h1 {
      margin-top: 40px;
      font-size: 42px;
      text-shadow: 0 0 12px rgba(0, 234, 255, 0.8);
    }

    h2 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #00eaff;
      text-shadow: 0 0 6px rgba(0, 234, 255, 0.7);
    }

    p {
      font-size: 14px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <h1>Study Lab</h1>
  <div class="container">
    <div class="card" onclick="location.href='physics.html'">
      <div class="icon">⚡</div>
      <h2>Vật lý</h2>
      <p>Khám phá các thí nghiệm mô phỏng vật lý.</p>
    </div>
    <div class="card" onclick="location.href='chemistry.html'">
      <div class="icon">🧪</div>
      <h2>Hóa học</h2>
      <p>Thí nghiệm hóa học trực quan và thú vị.</p>
    </div>
    <div class="card" onclick="location.href='biology.html'">
      <div class="icon">🧬</div>
      <h2>Sinh học</h2>
      <p>Khám phá thế giới sinh học qua mô phỏng.</p>
    </div>
    <div class="card" onclick="location.href='math.html'">
      <div class="icon">📐</div>
      <h2>Toán học</h2>
      <p>Trực quan hóa các khái niệm toán học.</p>
    </div>
  </div>
</body>
</html>
